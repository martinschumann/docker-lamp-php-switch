<VirtualHost *:80>
    ServerName examplehost.lamp.localhost
    DocumentRoot /srv/apache2/vhosts/examplehost/public

    <Directory /srv/apache2/vhosts/examplehost/public>
        Options Indexes SymLinksIfOwnerMatch
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php${PHP_VERSION}-fpm.sock|fcgi://localhost/"
    </FilesMatch>
</VirtualHost>

<VirtualHost *:443>
    ServerName examplehost.lamp.localhost
    DocumentRoot /srv/apache2/vhosts/examplehost/public

    <Directory /srv/apache2/vhosts/examplehost/public>
        Options Indexes SymLinksIfOwnerMatch
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php${PHP_VERSION}-fpm.sock|fcgi://localhost/"

        SSLOptions +StdEnvVars
    </FilesMatch>

    SSLEngine on
    SSLCertificateFile      /opt/pki/certs/wildcard.lamp.localhost.crt
    SSLCertificateKeyFile   /opt/pki/private/wildcard.lamp.localhost.key
</VirtualHost>
